version: "3.8"

services:
  mongodb:
    image: mongo:5.0
    container_name: jobhub-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: jobhub-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://root:root@mongodb:27017/job-platform?authSource=admin
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: jobhub-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  default:
    name: jobhub-network
